<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrelia — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .login-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 100px 20px 60px;
    }

    .login-card {
      width: 100%; max-width: 440px;
      background: linear-gradient(145deg, var(--card-bg), var(--card-bg2));
      border: 1px solid rgba(var(--a2r), .25);
      border-radius: 28px;
      padding: 52px 44px;
      backdrop-filter: blur(12px);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(var(--a1r), .5), rgba(var(--a2r), .5), transparent);
    }

    .login-logo {
      text-align: center; margin-bottom: 36px;
    }
    .login-logo img { height: 44px; filter: drop-shadow(0 0 12px rgba(var(--a1r), .4)); }

    .login-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid rgba(var(--a2r), .2);
      margin-bottom: 32px;
    }
    .login-tab {
      flex: 1; background: none; border: none;
      padding: 12px; font-family: 'Montserrat', sans-serif;
      font-size: .76rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--tx4); cursor: pointer;
      position: relative; transition: color .2s;
    }
    .login-tab::after {
      content: ''; position: absolute; bottom: -1px; left: 15%; right: 15%; height: 2px;
      background: linear-gradient(90deg, var(--a1), var(--a2));
      border-radius: 2px; opacity: 0; transform: scaleX(0);
      transition: opacity .25s, transform .25s;
    }
    .login-tab.active {
      background: linear-gradient(135deg, var(--a1), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .login-tab.active::after { opacity: 1; transform: scaleX(1); }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: .72rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--tx4); margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 13px 16px;
      background: rgba(var(--a2r), .07);
      border: 1px solid rgba(var(--a2r), .25);
      border-radius: 12px; color: var(--tx);
      font-family: 'Montserrat', sans-serif; font-size: .88rem;
      outline: none; transition: border-color .25s, box-shadow .25s;
      box-sizing: border-box;
    }
    .form-input:focus {
      border-color: rgba(var(--a1r), .5);
      box-shadow: 0 0 0 3px rgba(var(--a1r), .08);
    }

    .btn-auth {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: #fff; border: none; border-radius: 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: .82rem; letter-spacing: .16em; text-transform: uppercase;
      cursor: pointer; margin-top: 8px;
      box-shadow: 0 0 24px rgba(var(--a1r), .3);
      transition: box-shadow .25s, transform .2s, opacity .2s;
    }
    .btn-auth:hover:not(:disabled) {
      box-shadow: 0 0 40px rgba(var(--a1r), .5); transform: translateY(-2px);
    }
    .btn-auth:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .auth-error {
      display: none; margin-top: 16px; padding: 12px 16px;
      background: rgba(200,50,50,.1); border: 1px solid rgba(200,50,50,.3);
      border-radius: 10px; font-size: .82rem; color: #f87171; text-align: center;
    }
    .auth-success {
      display: none; margin-top: 16px; padding: 12px 16px;
      background: rgba(var(--a1r), .08); border: 1px solid rgba(var(--a1r), .25);
      border-radius: 10px; font-size: .82rem; color: var(--tx2); text-align: center;
    }

    .login-footer {
      text-align: center; margin-top: 28px;
      font-size: .76rem; color: var(--tx5);
    }
    .login-footer a { color: var(--a1); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<nav>
  <a class="nav-logo" href="index.html"><img src="Logga Astrelia.png" alt="Astrelia" /></a>
  <ul class="nav-links">
    <li><a href="index.html" data-i18n="nav.home">Hem</a></li>
    <li><a href="tcg.html" data-i18n="nav.tcg">TCG</a></li>
    <li><a href="music.html" data-i18n="nav.music">Musik</a></li>
    <li><a href="collection.html" data-i18n="nav.collection">Min samling</a></li>
  </ul>
  <div class="nav-right">
    <button class="lang-toggle" onclick="toggleLang()">EN</button>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
      <span class="toggle-icon" id="toggle-icon">☀️</span>
      <span id="toggle-label">Sun</span>
    </button>
  </div>
  <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" onclick="toggleMobileMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="nav-mobile-menu" id="nav-mobile-menu">
  <a href="index.html" data-i18n="nav.home">Hem</a>
  <a href="tcg.html" data-i18n="nav.tcg">TCG</a>
  <a href="music.html" data-i18n="nav.music">Musik</a>
  <a href="collection.html" data-i18n="nav.collection">Min samling</a>
  <div class="nav-mobile-toggle">
    <button class="theme-toggle" id="theme-toggle-mobile" onclick="toggleTheme()">
      <span class="toggle-icon" id="toggle-icon-mobile">☀️</span>
      <span id="toggle-label-mobile">Sun</span>
    </button>
    <button class="lang-toggle" onclick="toggleLang(); toggleMobileMenu()">EN</button>
  </div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="Logga Astrelia.png" alt="Astrelia" />
    </div>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-signin" onclick="showTab('signin')" data-i18n="login.tab-signin">Logga in</button>
      <button class="login-tab" id="tab-signup" onclick="showTab('signup')" data-i18n="login.tab-signup">Skapa konto</button>
    </div>

    <!-- Sign In -->
    <div id="form-signin">
      <div class="form-group">
        <label class="form-label" data-i18n="login.label-email">E-post</label>
        <input class="form-input" type="email" id="signin-email" data-i18n-ph="login.ph-email" placeholder="du@exempel.se" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.label-password">Lösenord</label>
        <input class="form-input" type="password" id="signin-password" data-i18n-ph="login.ph-pw-current" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-auth" id="signin-btn" onclick="signIn()" data-i18n="login.btn-signin">Logga in ✦</button>
      <div class="auth-error" id="signin-error"></div>
    </div>

    <!-- Sign Up -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label class="form-label" data-i18n="login.label-name">Ditt namn</label>
        <input class="form-input" type="text" id="signup-name" data-i18n-ph="login.ph-name" placeholder="Förnamn" autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.label-email">E-post</label>
        <input class="form-input" type="email" id="signup-email" data-i18n-ph="login.ph-email" placeholder="du@exempel.se" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="login.label-password">Lösenord</label>
        <input class="form-input" type="password" id="signup-password" data-i18n-ph="login.ph-pw-new" placeholder="Min. 6 tecken" autocomplete="new-password" />
      </div>
      <button class="btn-auth" id="signup-btn" onclick="signUp()" data-i18n="login.btn-signup">Skapa konto ✦</button>
      <div class="auth-error" id="signup-error"></div>
      <div class="auth-success" id="signup-success"></div>
    </div>

    <p class="login-footer" data-i18n="login.footer">
      Genom att logga in godkänner du våra <a href="#">villkor</a> — din data är säker hos oss ✦
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="theme.js"></script>
<script src="stars.js"></script>
<script src="lang.js?v=2"></script>
<script>
  // Redirect if already logged in
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) location.href = returnUrl();
  });

  function returnUrl() {
    const p = new URLSearchParams(location.search);
    return p.get('return') || 'collection.html';
  }

  function showTab(tab) {
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  }

  async function signIn() {
    const email    = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    const btn      = document.getElementById('signin-btn');
    const err      = document.getElementById('signin-error');
    err.style.display = 'none';
    if (!email || !password) { showError(err, 'Please fill in all fields.'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showError(err, error.message); btn.disabled = false; btn.textContent = 'Sign In ✦'; return; }
    location.href = returnUrl();
  }

  async function signUp() {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const btn      = document.getElementById('signup-btn');
    const err      = document.getElementById('signup-error');
    const suc      = document.getElementById('signup-success');
    err.style.display = 'none'; suc.style.display = 'none';
    if (!name || !email || !password) { showError(err, 'Please fill in all fields.'); return; }
    if (password.length < 6) { showError(err, 'Password must be at least 6 characters.'); return; }
    btn.disabled = true; btn.textContent = 'Creating account…';
    const { error } = await sb.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    if (error) { showError(err, error.message); btn.disabled = false; btn.textContent = 'Create Account ✦'; return; }
    suc.style.display = 'block';
    suc.textContent = 'Account created! Check your email to confirm, then sign in.';
    btn.disabled = false; btn.textContent = 'Create Account ✦';
  }

  function showError(el, msg) { el.textContent = msg; el.style.display = 'block'; }

  // Enter key submits
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('form-signin').style.display !== 'none') signIn();
    else signUp();
  });

  function toggleMobileMenu() {
    const menu = document.getElementById('nav-mobile-menu');
    const btn  = document.getElementById('nav-hamburger');
    const open = menu.classList.toggle('open');
    btn.classList.toggle('open', open);
    document.body.style.overflow = open ? 'hidden' : '';
  }
  document.querySelectorAll('.nav-mobile-menu a').forEach(a =>
    a.addEventListener('click', () => {
      document.getElementById('nav-mobile-menu').classList.remove('open');
      document.getElementById('nav-hamburger').classList.remove('open');
      document.body.style.overflow = '';
    })
  );
</script>
</body>
</html>
